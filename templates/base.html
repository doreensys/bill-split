<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Smart Bill Splitter{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="wrap">
  <div class="receipt">
    {% block content %}{% endblock %}
  </div>
  <footer class="hint">{% block footer %}made to end the "who had the fries" debate{% endblock %}</footer>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
